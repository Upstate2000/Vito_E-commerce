{# templates/cart/_cart_totals.html #}
<div class="cart-footer d-flex justify-content-between align-items-center mt-4">
  <div><a href="{% url 'catalog:product_list' %}" class="btn btn-link">Seguir comprando</a></div>
  <div class="text-end">
    <div class="mb-2"><small class="text-muted">Subtotal</small></div>
    <div class="h5 mb-3" aria-label="Total del carrito">{{ cart.get_total_price|format_cop }}</div>
    <div class="d-flex gap-2 justify-content-end">
      <a href="{% url 'cart:detail' %}" class="btn btn-outline-secondary">Actualizar</a>
      <a href="{% url 'orders:checkout' %}" class="btn btn-primary">Ir a pagar</a>
    </div>
  </div>
</div>
